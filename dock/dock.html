<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cairo-Dock</title>
    <link rel="stylesheet" href="dock.css" />
  </head>
  <body>
    <div id="main">
      <div id="container">
        <div id="deepseek" class="item">
          <a href="#"
            ><img class="deepseek" src="deepseek.webp" id="hover" alt=""
          /></a>
          <label for="deepseek">DeepSeek</label>
        </div>
        <div id="ds" class="item">
          <a href="#"><img class="ds" src="ds.png" id="hover" alt="" /></a>
          <label for="ds">Discord</label>
        </div>
        <div id="gpt" class="item">
          <a href="#"><img class="gpt" src="gpt.webp" id="hover" alt="" /></a>
          <label for="gpt">Chat GPT</label>
        </div>
        <div id="vs" class="item">
          <a href="#"><img class="vs" src="vs.webp" id="hover" alt="" /></a>
          <label for="vs">VS Code</label>
        </div>
        <div id="jupyter" class="item">
          <a href="#"
            ><img class="jupyter" src="jupyter.webp" id="hover" alt=""
          /></a>
          <label for="jupyter">Jupyter</label>
        </div>
      </div>
    </div>
    <div id="container2">
      <div id="text"><p>Add / Remove icons</p>
      <div id="addremove">
        <div id="add">
                  <div id="icons"></div>
                  <button class="but">Add</button>
        </div>
        <div id="remove">
                  <div id="icons">

                    <i id="vs">
                      <input type="checkbox">
                      <img class="vs" src="vs.webp"alt="" />
                    </i>

                  </div>
                  <button class="but">Remove</button>
        </div> 
      </div>
      </div>
  </body>
</html>
