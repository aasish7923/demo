<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>List</title>
</head>
<body>
    <header></header>
    <main>
            <section>
                    <h3>Unordered List of words: </h3>
                    <ul>
                        <li>Cat</li>
                        <li>Dog</li>
                        <li>Human</li>
                        <li>Mango</li>
                        <li>Apple</li>
                    </ul>
                    <hr>
                    <h3>Ordered List of words: </h3>
                    <ol>
                        <li>Cat</li>
                        <li>Dog</li>
                        <li>Human</li>
                        <li>Mango</li>
                        <li>Apple</li>
                    </ol>
            </section>
            <aside></aside>
    </main>
    <footer></footer>
</body>
</html>
